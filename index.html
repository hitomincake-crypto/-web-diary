<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Diary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>📅 Diary</h1>
</header>

<div class="container">

  <div id="loginArea" class="card">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">ログイン</button>
  </div>

  <div id="nicknameArea" class="card" style="display:none;">
    <input id="nicknameInput" placeholder="ニックネーム">
    <button onclick="saveNickname()">保存</button>
  </div>

  <div id="app" style="display:none;">

    <div id="calendarView" class="card"></div>

    <div id="dayView" class="card" style="display:none;">
      <h3 id="selectedDate"></h3>
      <div id="dailyList"></div>
    </div>

    <div id="editorView" class="card" style="display:none;">
      <input id="title" placeholder="タイトル">
      <textarea id="content" placeholder="本文"></textarea>
      <button onclick="saveDiary()">保存</button>
    </div>

  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="openEditor()">＋</button>

<!-- 下ナビ -->
<div class="bottom-nav">
  <button onclick="showView('calendarView')">📅</button>
  <button onclick="showView('dayView')">📖</button>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
